<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Form</title>
  </head>
  <body>
    <header align="center">
      <h1>PrupleBites Support</h1>
      <h3>
        <a href="index.html">Home |</a>
        <a href="index.html#Help">Help |</a>
        <a href="#contact">Contact</a>
      </h3>
      <hr />
      <h1 id="contact">Contact Us</h1>
      <h4>Send us a message and we will get back to you soon!</h4>
    </header>
    <form action="https://example.com/submit-form" method="post">
      <main>
        <section>
          <label for="Full name">Full Name :</label>
          <input type="text" id="Full name" name="Full name" required />
        </section>
        <br />
        <section>
          <label for="Email"
            >Email &nbsp; &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;:</label
          >
          <input type="email" id="Email" name="Email" required />
        </section>
        <br />
        <section>
          <label for="Subject">Subject &nbsp; &nbsp;&nbsp; :</label>
          <select id="Subject" name="Subject" required>
            <option>Choose a subject</option>
            <option>General Inquiry</option>
            <option>Technical Support</option>
            <option>Billing</option>
          </select>
        </section>
        <br />
        <section>
          <label for="Message">Message :</label>
          <textarea
            id="Message"
            name="Message"
            rows="5"
            cols="50"
            required
            minlength="15"
          ></textarea>
        </section>
        <br />
        <fieldset>
          <legend>How did you hear about us?</legend>
          <div>
            <input
              type="radio"
              id="Social Media"
              name="source"
              value="Social Media"
            />
            <label for="Social Media">Social Media</label>
          </div>
          <br />
          <div>
            <input type="radio" id="Friend" name="source" value="Friend" />
            <label for="Friend">Friend</label>
          </div>
          <br />
          <div>
            <input
              type="radio"
              id="Advertisement"
              name="source"
              value="Advertisement"
            />
            <label for="Advertisement">Advertisement</label>
          </div>
        </fieldset>
        <br />
        <section>
          <input type="checkbox" id="Updates" name="Updates" value="yes" />
          <label for="Updates"
            >I would like to receive updates and promotions.</label
          >
        </section>
        <br />
        <section>
          <button type="submit" style="height: 30px; width: 150px">
            Send Message
          </button>
        </section>
      </main>
      <hr />
      <footer align="center">
        <p>&copy; 2024 PrupleBites. All rights reserved.</p>
      </footer>
    </form>
  </body>
</html>
